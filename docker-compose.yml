services:
  appex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appex-platform
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      # Persist test reports & artifacts across container restarts
      - appex-reports:/app/backend/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  appex-reports:
